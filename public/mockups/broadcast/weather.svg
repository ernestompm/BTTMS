<?xml version="1.0" encoding="UTF-8"?>
<!--
  Weather · skin Broadcast
  Dimensiones: 430 x 220 px
  Posición: bottom-left (left:58 bottom:58)
  Edita libremente.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 430 220" width="430" height="220">
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1820" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#0c1820" stop-opacity="0.42"/>
    </linearGradient>
  </defs>

  <g transform="translate(215 110) skewX(-8) translate(-215 -110)">
    <rect x="0" y="0" width="430" height="220" rx="32" fill="url(#cardBg)" stroke="rgba(255,255,255,0.24)"/>

    <g transform="translate(215 110) skewX(8) translate(-215 -110)">
      <!-- Sun emoji area -->
      <text x="80" y="125" text-anchor="middle" font-size="80" font-weight="900" fill="#fde047">☀️</text>

      <!-- City label -->
      <text x="160" y="60" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="900" letter-spacing="2.4" fill="#00e0c6">LAS PALMAS</text>

      <!-- Temperature -->
      <text x="160" y="120" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="900" font-style="italic" letter-spacing="-0.5" fill="#ffffff">28°</text>

      <!-- Condition -->
      <text x="160" y="142" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="900" letter-spacing="2" fill="rgba(255,255,255,0.64)">DESPEJADO</text>

      <!-- Stats grid 2x2 -->
      <g transform="translate(160 158)">
        <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="900" letter-spacing="2" fill="rgba(255,255,255,0.64)">VIENTO</text>
        <text x="0" y="18" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="900" fill="#ffffff">12 km/h</text>

        <text x="130" y="0" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="900" letter-spacing="2" fill="rgba(255,255,255,0.64)">HUMEDAD</text>
        <text x="130" y="18" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="900" fill="#ffffff">58%</text>

        <text x="0" y="38" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="900" letter-spacing="2" fill="rgba(255,255,255,0.64)">UV</text>
        <text x="0" y="56" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="900" fill="#ffffff">ALTO</text>

        <text x="130" y="38" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="900" letter-spacing="2" fill="rgba(255,255,255,0.64)">SENSACIÓN</text>
        <text x="130" y="56" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="900" fill="#ffffff">31°</text>
      </g>
    </g>

    <!-- Bottom dual accents -->
    <rect x="0" y="217" width="146" height="3" fill="#00e0c6"/>
    <rect x="284" y="217" width="146" height="3" fill="#ff7b61"/>
  </g>
</svg>
