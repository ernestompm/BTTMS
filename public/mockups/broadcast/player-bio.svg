<?xml version="1.0" encoding="UTF-8"?>
<!--
  Player Bio (lateral) · skin Broadcast
  Dimensiones: 720 x 235 px
  Posición: lateral izquierda (left:78 bottom:86) o derecha (right:78 bottom:86)
  Edita libremente. Skew exterior -8deg.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 235" width="720" height="235">
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1820" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#0c1820" stop-opacity="0.42"/>
    </linearGradient>
    <linearGradient id="photoBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e0c6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff7b61" stop-opacity="0.22"/>
    </linearGradient>
  </defs>

  <g transform="translate(360 117) skewX(-8) translate(-360 -117)">
    <rect x="0" y="0" width="720" height="235" rx="34" fill="url(#cardBg)" stroke="rgba(255,255,255,0.24)"/>

    <g transform="translate(360 117) skewX(8) translate(-360 -117)">
      <!-- Photo -->
      <rect x="42" y="44" width="148" height="148" rx="32" fill="url(#photoBg)" stroke="rgba(255,255,255,0.28)" stroke-width="1"/>
      <text x="116" y="138" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="58" font-weight="900" font-style="italic" fill="rgba(255,255,255,0.62)">A</text>

      <!-- Main info -->
      <g>
        <!-- Country -->
        <rect x="218" y="46" width="36" height="24" rx="2" fill="#c8102e"/>
        <rect x="218" y="46" width="36" height="8" fill="#ffd100"/>
        <text x="266" y="64" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="900" letter-spacing="2" fill="rgba(255,255,255,0.7)">ESPAÑA</text>

        <!-- Name -->
        <text x="218" y="120" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="700" font-style="italic" letter-spacing="0.5" fill="rgba(255,255,255,0.85)">CARLOS</text>
        <text x="218" y="160" font-family="Inter, system-ui, sans-serif" font-size="40" font-weight="900" font-style="italic" letter-spacing="0.4" fill="#ffffff">GARCÍA</text>
      </g>

      <!-- Facts grid (right column) -->
      <g>
        <line x1="500" y1="50" x2="680" y2="50" stroke="rgba(255,255,255,0.13)"/>

        <text x="500" y="68" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="900" letter-spacing="2" fill="rgba(255,255,255,0.46)">EDAD</text>
        <text x="680" y="68" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="900" fill="#ffffff">28</text>
        <line x1="500" y1="80" x2="680" y2="80" stroke="rgba(255,255,255,0.13)"/>

        <text x="500" y="98" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="900" letter-spacing="2" fill="rgba(255,255,255,0.46)">MANO</text>
        <text x="680" y="98" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="900" fill="#ffffff">DIESTRO</text>
        <line x1="500" y1="110" x2="680" y2="110" stroke="rgba(255,255,255,0.13)"/>

        <text x="500" y="128" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="900" letter-spacing="2" fill="rgba(255,255,255,0.46)">RANKING</text>
        <text x="680" y="128" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="900" fill="#ffffff">#12</text>
        <line x1="500" y1="140" x2="680" y2="140" stroke="rgba(255,255,255,0.13)"/>

        <text x="500" y="158" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="900" letter-spacing="2" fill="rgba(255,255,255,0.46)">CLUB</text>
        <text x="680" y="158" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="900" fill="#ffffff">CT MADRID</text>
        <line x1="500" y1="170" x2="680" y2="170" stroke="rgba(255,255,255,0.13)"/>

        <text x="500" y="188" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="900" letter-spacing="2" fill="rgba(255,255,255,0.46)">FEDERACIÓN</text>
        <text x="680" y="188" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="900" fill="#ffffff">FTM MADRID</text>
      </g>
    </g>

    <!-- Single accent at bottom (color del equipo) -->
    <rect x="0" y="232" width="720" height="3" fill="#00e0c6"/>
  </g>
</svg>
