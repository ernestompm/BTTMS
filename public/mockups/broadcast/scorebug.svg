<?xml version="1.0" encoding="UTF-8"?>
<!--
  Scorebug · skin Broadcast
  Dimensiones: 540 x 200 px
  Posición original en stage 1920x1080: top:42 left:42
  Skew exterior: skewX(-8deg)
  Edita libremente. Los textos como "GARCÍA / RUIZ" son placeholders.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 200" width="540" height="200">
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1820" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#0c1820" stop-opacity="0.42"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="20%" stop-color="white" stop-opacity="0"/>
      <stop offset="47%" stop-color="white" stop-opacity="0.16"/>
      <stop offset="64%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer skewed card -->
  <g transform="translate(270 100) skewX(-8) translate(-270 -100)">
    <!-- card body -->
    <rect x="20" y="14" width="500" height="172" rx="22" fill="url(#cardBg)" stroke="rgba(255,255,255,0.24)" stroke-width="1"/>
    <!-- sheen sweep -->
    <rect x="20" y="14" width="500" height="172" rx="22" fill="url(#sheen)" opacity="0.6"/>

    <!-- Header strip -->
    <rect x="20" y="14" width="500" height="32" fill="rgba(0,0,0,0.22)"/>
    <text x="40" y="35" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="3" fill="rgba(255,255,255,0.96)">1ER SET</text>
    <!-- right-side small logo placeholder -->
    <circle cx="500" cy="30" r="10" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.30)" stroke-width="1"/>

    <!-- Inner content (counter-skewed para que el texto se lea recto) -->
    <g transform="translate(270 100) skewX(8) translate(-270 -100)">

      <!-- TEAM 1 row -->
      <!-- accent stripe izquierda en color del equipo 1 -->
      <rect x="32" y="56" width="6" height="60" fill="#ef4444"/>
      <!-- bandera placeholder -->
      <rect x="48" y="74" width="28" height="20" rx="2" fill="#c8102e" opacity="0.85"/>
      <rect x="48" y="74" width="28" height="6" fill="#ffd100"/>
      <!-- nombre -->
      <text x="86" y="92" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="900" font-style="italic" letter-spacing="0.7" fill="#ffffff">GARCÍA / RUIZ</text>
      <!-- set pills -->
      <circle cx="350" cy="86" r="17" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.13)"/>
      <text x="350" y="92" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="900" fill="#ffffff">6</text>
      <circle cx="395" cy="86" r="17" fill="rgba(239,68,68,0.35)" stroke="#ef4444"/>
      <text x="395" y="92" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="900" fill="#ffffff">3</text>
      <!-- point pill -->
      <rect x="430" y="69" width="68" height="34" rx="17" fill="#ef4444"/>
      <text x="464" y="92" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="900" font-style="italic" fill="#ffffff">40</text>

      <!-- separator line entre equipos -->
      <line x1="32" y1="120" x2="510" y2="120" stroke="rgba(255,255,255,0.10)"/>

      <!-- TEAM 2 row -->
      <rect x="32" y="124" width="6" height="60" fill="#af005f"/>
      <rect x="48" y="142" width="28" height="20" rx="2" fill="#c8102e" opacity="0.85"/>
      <rect x="48" y="142" width="28" height="6" fill="#ffd100"/>
      <text x="86" y="160" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="900" font-style="italic" letter-spacing="0.7" fill="#ffffff">CÁMARA / CASTAÑO</text>
      <circle cx="350" cy="154" r="17" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.13)"/>
      <text x="350" y="160" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="900" fill="#ffffff">3</text>
      <circle cx="395" cy="154" r="17" fill="rgba(175,0,95,0.35)" stroke="#af005f"/>
      <text x="395" y="160" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="900" fill="#ffffff">2</text>
      <rect x="430" y="137" width="68" height="34" rx="17" fill="#af005f"/>
      <text x="464" y="160" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="900" font-style="italic" fill="#ffffff">30</text>
    </g>

    <!-- Bottom dual accents (firma del skin) -->
    <rect x="20" y="183" width="170" height="3" fill="#00e0c6" filter="url(#glow)"/>
    <rect x="350" y="183" width="170" height="3" fill="#ff7b61" filter="url(#glow)"/>
  </g>
</svg>
