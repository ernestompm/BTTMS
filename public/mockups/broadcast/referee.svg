<?xml version="1.0" encoding="UTF-8"?>
<!--
  Referee Lower Third · skin Broadcast
  Dimensiones: 520 x 150 px
  Posición: bottom-right (right:62 bottom:64)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 150" width="520" height="150">
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1820" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#0c1820" stop-opacity="0.42"/>
    </linearGradient>
  </defs>

  <g transform="translate(260 75) skewX(-8) translate(-260 -75)">
    <rect x="0" y="0" width="520" height="150" rx="30" fill="url(#cardBg)" stroke="rgba(255,255,255,0.24)"/>

    <g transform="translate(260 75) skewX(8) translate(-260 -75)">
      <text x="34" y="44" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="900" letter-spacing="2.4" fill="#00e0c6">JUEZ ÁRBITRO</text>
      <text x="34" y="86" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="900" font-style="italic" letter-spacing="0.5" fill="#ffffff">SOFÍA MARTÍNEZ</text>
      <text x="34" y="116" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="900" letter-spacing="2" fill="rgba(255,255,255,0.64)">FED. MADRILEÑA · INTERNACIONAL</text>
    </g>

    <!-- Single coral accent (right side) -->
    <rect x="0" y="147" width="520" height="3" fill="#ff7b61"/>
  </g>
</svg>
